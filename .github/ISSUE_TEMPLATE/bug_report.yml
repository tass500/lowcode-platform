name: Bug report
description: Report a bug
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Provide steps to reproduce the issue.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs and screenshots.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - frontend
        - backend
        - docs
        - ci
    validations:
      required: true
