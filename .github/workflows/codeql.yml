name: CodeQL

on:
  push:
    branches:
      - main # default trunk
      - master # legacy
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '0 3 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Explicit build-mode avoids CodeQL warnings about overlay DB / undefined mode when using manual build steps.
          - language: csharp
            build-mode: manual
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend
        if: matrix.language == 'csharp'
        run: |
          dotnet restore backend/LowCodePlatform.Backend.csproj
          dotnet build backend/LowCodePlatform.Backend.csproj -c Release --no-restore

      - name: Install frontend
        if: matrix.language == 'javascript-typescript'
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        if: matrix.language == 'javascript-typescript'
        run: npm run build
        working-directory: frontend

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
