name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-format:
    name: Backend - dotnet format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: |
          dotnet restore backend/LowCodePlatform.Backend.csproj
          dotnet restore backend/LowCodePlatform.Backend.Tests/LowCodePlatform.Backend.Tests.csproj

      - name: Verify formatting
        run: |
          dotnet format --verify-no-changes backend/LowCodePlatform.Backend.csproj
          dotnet format --verify-no-changes backend/LowCodePlatform.Backend.Tests/LowCodePlatform.Backend.Tests.csproj

  backend-supply-chain:
    name: Backend - vulnerable packages (NuGet)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore (audit enabled via Directory.Build.props)
        run: |
          dotnet restore backend/LowCodePlatform.Backend.csproj
          dotnet restore backend/LowCodePlatform.Backend.Tests/LowCodePlatform.Backend.Tests.csproj

      - name: List vulnerable packages (fail if any)
        run: |
          dotnet list backend/LowCodePlatform.Backend.csproj package --vulnerable --include-transitive
          dotnet list backend/LowCodePlatform.Backend.Tests/LowCodePlatform.Backend.Tests.csproj package --vulnerable --include-transitive

  backend-sbom:
    name: Backend - SBOM (CycloneDX)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore backend project
        run: dotnet restore backend/LowCodePlatform.Backend.csproj

      - name: Restore .NET local tools (CycloneDX)
        run: dotnet tool restore

      - name: Generate CycloneDX JSON SBOM
        run: |
          mkdir -p artifacts/sbom
          dotnet tool run dotnet-CycloneDX -- backend/LowCodePlatform.Backend.csproj \
            -o artifacts/sbom \
            -fn lowcode-backend.cdx.json \
            -F Json \
            -dpr \
            -sn LowCodePlatform.Backend \
            -sv "${{ github.sha }}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-backend-cyclonedx-json
          path: artifacts/sbom/lowcode-backend.cdx.json
          if-no-files-found: error
          retention-days: 90

  backend-build:
    name: Backend - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore backend/LowCodePlatform.Backend.csproj

      - name: Build
        run: dotnet build backend/LowCodePlatform.Backend.csproj -c Release --no-restore

  backend-test:
    name: Backend - test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore backend/LowCodePlatform.Backend.Tests/LowCodePlatform.Backend.Tests.csproj

      - name: Test
        run: dotnet test backend/LowCodePlatform.Backend.Tests/LowCodePlatform.Backend.Tests.csproj -c Release --no-restore

  frontend-quality:
    name: Frontend - lint + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  docker-images:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [backend-format, backend-supply-chain, backend-test, frontend-quality]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.backend
          push: false
          tags: lowcode-platform/backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.frontend
          push: false
          tags: lowcode-platform/frontend:ci

  helm-chart:
    name: Helm — template
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: helm lint & template
        run: |
          helm lint deploy/helm/lowcode-platform
          helm template lcp deploy/helm/lowcode-platform --debug | head -n 5
