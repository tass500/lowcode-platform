version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Batch compatible bumps into fewer PRs (review + CI load). More specific groups win first.
    groups:
      angular-ecosystem:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"
          - "@angular-eslint/*"
          - "@ngtools/*"
          - "@schematics/*"
        update-types:
          - "patch"
          - "minor"
      frontend-runtime:
        patterns:
          - "angular-oauth2-oidc"
          - "rxjs"
          - "tslib"
          - "zone.js"
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "@angular/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@angular-eslint/*"
        update-types: ["version-update:semver-major"]
      # Stack: Angular 17 + TS 5.4 + ESLint 8 — major bumps need a coordinated upgrade PR, not isolated Dependabot PRs.
      - dependency-name: "@angular-devkit/*"
        update-types: ["version-update:semver-major"]
      # Pin TypeScript minor line with Angular 17 (e.g. 5.4.x); allow only patch bumps until a planned TS/Angular upgrade.
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/*"
        update-types: ["version-update:semver-major"]
      # Stay on the Angular 17–aligned line until a coordinated frontend upgrade (v18+ libs expect newer @angular/*).
      - dependency-name: "angular-oauth2-oidc"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      # Angular 17 expects zone.js ~0.14.x; 0.15+ is for newer Angular — allow only patch on 0.14.
      - dependency-name: "zone.js"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

  - package-ecosystem: "nuget"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      backend-libraries:
        patterns:
          - "Microsoft.*"
          - "Swashbuckle*"
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "Microsoft.EntityFrameworkCore*"
        update-types: ["version-update:semver-major"]
      # Swagger major jumps (e.g. 6 → 10) need a coordinated OpenAPI / breaking-change review.
      - dependency-name: "Swashbuckle.AspNetCore"
        update-types: ["version-update:semver-major"]

  # Local dotnet tools (e.g. dotnet-ef for migrations, cyclonedx for SBOM)
  - package-ecosystem: "nuget"
    directory: "/.config"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      dotnet-tools:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "dotnet-ef"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
