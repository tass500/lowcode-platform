{{- $secretName := include "lowcode-platform.backend.secretName" . | trim -}}
{{- if and (eq .Values.backend.database.tenantProvider "sqlserver") (eq $secretName "") }}
{{- fail "database.tenantProvider=sqlserver requires backend.secrets.create=true or backend.secrets.existingSecret (with keys jwt-signing-key and tenant-connection-string)" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lowcode-platform.backend.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "lowcode-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "lowcode-platform.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "lowcode-platform.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__Management
              value: Data Source=/data/management.db
            - name: Tenancy__DefaultTenantSlug
              value: default
            - name: Tenancy__DefaultTenantConnectionStringSecretRef
              value: default
            {{- if eq .Values.backend.database.tenantProvider "sqlite" }}
            - name: Tenancy__DefaultTenantConnectionString
              value: Data Source=/data/tenant-default.db
            - name: Tenancy__Secrets__default
              value: Data Source=/data/tenant-default.db
            {{- else }}
            - name: Tenancy__DefaultTenantConnectionString
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: tenant-connection-string
            - name: Tenancy__Secrets__default
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: tenant-connection-string
            {{- if .Values.backend.database.sqlserver.ensureCreated }}
            - name: LCP_SQLSERVER_ENSURE_CREATED
              value: "1"
            {{- end }}
            {{- end }}
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.backend.env.ASPNETCORE_ENVIRONMENT | quote }}
            {{- if $secretName }}
            - name: Auth__Jwt__SigningKey
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: jwt-signing-key
            {{- else }}
            - name: Auth__Jwt__SigningKey
              value: {{ .Values.backend.secrets.jwtSigningKey | quote }}
            {{- end }}
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        {{- if eq .Values.backend.dataVolume.type "pvc" }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "lowcode-platform.backend.pvcName" . }}
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
