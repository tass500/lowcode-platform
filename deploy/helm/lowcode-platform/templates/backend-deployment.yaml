apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lowcode-platform.backend.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "lowcode-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "lowcode-platform.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "lowcode-platform.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__Management
              value: Data Source=/data/management.db
            - name: Tenancy__DefaultTenantSlug
              value: default
            - name: Tenancy__DefaultTenantConnectionString
              value: Data Source=/data/tenant-default.db
            - name: Tenancy__DefaultTenantConnectionStringSecretRef
              value: default
            - name: Tenancy__Secrets__default
              value: Data Source=/data/tenant-default.db
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.backend.env.ASPNETCORE_ENVIRONMENT | quote }}
            - name: Auth__Jwt__SigningKey
              value: {{ .Values.backend.env.Auth__Jwt__SigningKey | quote }}
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
