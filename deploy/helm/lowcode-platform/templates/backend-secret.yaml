{{- if and .Values.backend.secrets.create (not .Values.backend.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-secret" (include "lowcode-platform.backend.fullname" .) }}
  labels:
    app.kubernetes.io/name: {{ include "lowcode-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  jwt-signing-key: {{ .Values.backend.secrets.jwtSigningKey | quote }}
  {{- if eq .Values.backend.database.tenantProvider "sqlserver" }}
  tenant-connection-string: {{ required "backend.secrets.sqlserverTenantConnectionString is required when database.tenantProvider is sqlserver (or use backend.secrets.existingSecret with key tenant-connection-string)" .Values.backend.secrets.sqlserverTenantConnectionString | quote }}
  {{- end }}
{{- end }}
