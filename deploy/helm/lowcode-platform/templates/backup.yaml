{{- if .Values.backup.enabled }}
{{- if ne (int .Values.backend.replicaCount) 1 }}
{{- fail "backup.enabled requires backend.replicaCount=1 (SQLite kubectl cp targets one backend pod)" }}
{{- end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lowcode-platform.fullname" . }}-backup
  labels:
    app.kubernetes.io/name: {{ include "lowcode-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "lowcode-platform.fullname" . }}-backup
  labels:
    app.kubernetes.io/name: {{ include "lowcode-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backup
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "lowcode-platform.fullname" . }}-backup
  labels:
    app.kubernetes.io/name: {{ include "lowcode-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "lowcode-platform.fullname" . }}-backup
subjects:
  - kind: ServiceAccount
    name: {{ include "lowcode-platform.fullname" . }}-backup
    namespace: {{ .Release.Namespace }}
{{- if .Values.backup.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "lowcode-platform.fullname" . }}-backup
  labels:
    app.kubernetes.io/name: {{ include "lowcode-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.backup.persistence.size | quote }}
  {{- with .Values.backup.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "lowcode-platform.fullname" . }}-sqlite-backup
  labels:
    app.kubernetes.io/name: {{ include "lowcode-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "lowcode-platform.name" . }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: backup
        spec:
          serviceAccountName: {{ include "lowcode-platform.fullname" . }}-backup
          restartPolicy: OnFailure
          containers:
            - name: kubectl-backup
              image: {{ .Values.backup.image.repository }}:{{ .Values.backup.image.tag }}
              imagePullPolicy: {{ .Values.backup.image.pullPolicy }}
              env:
                - name: BACKEND_LABEL_SELECTOR
                  value: app.kubernetes.io/name={{ include "lowcode-platform.name" . }},app.kubernetes.io/instance={{ .Release.Name }},app.kubernetes.io/component=backend
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
                  POD=$(kubectl get pods -n "$NS" -l "$BACKEND_LABEL_SELECTOR" -o jsonpath='{.items[0].metadata.name}')
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  kubectl cp -n "$NS" "$POD:/data/management.db" "/backup/management-${TS}.db" -c backend
                  {{- if eq .Values.backend.database.tenantProvider "sqlite" }}
                  kubectl cp -n "$NS" "$POD:/data/tenant-default.db" "/backup/tenant-default-${TS}.db" -c backend
                  {{- end }}
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              {{- if .Values.backup.persistence.enabled }}
              persistentVolumeClaim:
                claimName: {{ include "lowcode-platform.fullname" . }}-backup
              {{- else }}
              emptyDir: {}
              {{- end }}
{{- end }}
